<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch This</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Overlay that triggers autoplay with sound -->
  <div id="overlay" onclick="startVideo()">
    <div class="overlay-content">
      <h2>You've been invited!</h2>
      <p>Click anywhere to continue</p>
    </div>
  </div>

  <header>
    <h1>Watch This</h1>
  </header>

  <main>
    <div class="video-container">
      <div class="video-wrapper" id="video-wrapper">
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 Watch This
  </footer>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    var apiReady = false;

    function onYouTubeIframeAPIReady() {
      apiReady = true;
    }

    function startVideo() {
      document.getElementById('overlay').style.display = 'none';

      if (apiReady) {
        new YT.Player('video-wrapper', {
          videoId: 'dQw4w9WgXcQ',
          playerVars: {
            autoplay: 1,
            playsinline: 1,
            controls: 0,
            modestbranding: 1,
            rel: 0
          },
          events: {
            onReady: function (event) {
              event.target.playVideo();
            }
          }
        });
      } else {
        // Fallback if API hasn't loaded yet
        var wrapper = document.getElementById('video-wrapper');
        var iframe = document.createElement('iframe');
        iframe.setAttribute('src', 'https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&playsinline=1&controls=0&modestbranding=1&rel=0');
        iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
        iframe.setAttribute('allowfullscreen', '');
        iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;';
        wrapper.appendChild(iframe);
      }
    }
  </script>
</body>
</html>
