<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>April Fools</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d1321;
      color: #f0ebd8;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      background-color: #1d2d44;
      width: 100%;
      padding: 16px 32px;
      text-align: center;
      position: fixed;
      top: 0;
      border-bottom: 2px solid #3e5c76;
    }

    header h1 {
      color: #748cab;
      font-size: 1.5rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 80px 16px 32px;
    }

    .video-container {
      background-color: #1d2d44;
      border: 2px solid #3e5c76;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 800px;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    footer {
      background-color: #1d2d44;
      width: 100%;
      padding: 12px;
      text-align: center;
      color: #748cab;
      font-size: 0.85rem;
      border-top: 2px solid #3e5c76;
    }
  </style>
</head>
<body>
  <header>
    <h1>April Fools</h1>
  </header>

  <main>
    <div class="video-container">
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/EE-xtCF3T94"
          title="YouTube video player"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
        ></iframe>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 April Fools
  </footer>
</body>
</html>
